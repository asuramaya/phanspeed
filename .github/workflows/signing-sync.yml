name: signing-sync
# Enforces RELEASE.md's sync-signers invariant: release-signing/allowed_signers
# (and install.sh's embedded twin) must always be either (a) empty — the
# pre-arming shipping state, verification inert — or (b) exactly 4 well-formed
# lines, identical between the file and the embedded copy modulo the one
# trailing newline mudra's sync-signers always leaves on the anchor file but
# not the embedded copy. "Same 4 keys everywhere" is a CHECKED invariant
# here, not a convention.
#
# The canonical key home is ~/.ssh/asuramaya-master/ on the operator's own
# machine (ruling 13ee52ce) — outside every repo, never committed, never
# reachable by a CI runner. So this check is deliberately INTERNAL-CONSISTENCY
# ONLY: it can confirm the anchor is well-formed and its embedded twin matches
# it, but it cannot confirm either one still matches the operator's actual
# canonical keys — that comparison only ever happens locally, via
# `make sync-signers` itself.

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify anchor/embedded-copy consistency
        run: |
          python3 - <<'PYEOF'
          import re
          import sys

          anchor = open("release-signing/allowed_signers").read()
          install = open("install.sh").read()
          m = re.search(r"RELEASE_ALLOWED_SIGNERS='(.*?)'", install, re.DOTALL)
          if not m:
              sys.exit("RELEASE_ALLOWED_SIGNERS='...' not found in install.sh")
          embedded = m.group(1)

          if not anchor.strip():
              print("anchor is UNARMED (empty) — pre-signing shipping state.")
              if embedded.strip():
                  sys.exit("DRIFT: anchor is empty but install.sh's embedded "
                            "RELEASE_ALLOWED_SIGNERS is not — they must agree.")
              print("embedded copy agrees (also empty) OK")
              sys.exit(0)

          print("anchor is ARMED — checking internal consistency.")
          lines = [ln for ln in anchor.split("\n") if ln.strip()]
          if len(lines) != 4:
              sys.exit(f"expected exactly 4 lines in allowed_signers, found {len(lines)}")
          line_re = re.compile(
              r'^phanspeed namespaces="phanspeed-release,pills-tag" '
              r'\S+ \S+ \S+$')
          for ln in lines:
              if not line_re.match(ln):
                  sys.exit(f"malformed allowed_signers line: {ln!r}")
          print("4 well-formed lines OK")

          # mudra writes the anchor file WITH a trailing newline but embeds
          # the bare body (no trailing newline) into install.sh -- by design
          # (bin/mudra's sync_signers()), so compare with that one newline
          # normalized away rather than byte-for-byte.
          if embedded != anchor.rstrip("\n"):
              sys.exit("DRIFT: install.sh's embedded RELEASE_ALLOWED_SIGNERS "
                        "does not match release-signing/allowed_signers. "
                        "Re-run 'mudra sync-signers phanspeed' and commit the "
                        "result — never hand-edit either.")
          print("embedded copy matches the anchor file OK")
          PYEOF
