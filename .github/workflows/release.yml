name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          echo "tag=${tag} VERSION=${file}"
          if [ "${tag}" != "${file}" ]; then
            echo "::error::tag ${tag} does not match VERSION ${file}"
            exit 1
          fi

      - name: Build .deb (produces dist/*.deb + dist/SHA256SUMS)
        run: bash packaging/build-deb.sh

      - name: Build release tarball, fold into the same manifest
        run: |
          # .gitattributes export-ignore keeps CI/dev files out of the tarball.
          git archive --format=tar.gz --prefix=phanspeed/ -o dist/phanspeed.tar.gz HEAD
          ( cd dist && sha256sum phanspeed.tar.gz >> SHA256SUMS )
          echo "--- contents ---"
          tar -tzf dist/phanspeed.tar.gz
          echo "--- manifest (one signature covers every artifact it lists) ---"
          cat dist/SHA256SUMS

      # No signing step here, deliberately: phanspeed-update and install.sh
      # trust an SSH signature (ssh-keygen -Y verify) against a key pinned
      # INSIDE the client (release-signing/allowed_signers,
      # docs/RELEASE-SIGNING.md), precisely so this CI (or the GitHub account
      # behind it) is not the trust root. A secret/hardware key living in
      # Actions secrets would let anyone who compromises the account or the
      # workflow sign whatever they just pushed -- that defeats the entire
      # scheme. The release ships UNSIGNED from here; the operator signs the
      # published SHA256SUMS bytes BY HAND, offline, with the physical FIDO2
      # key, and runs `gh release upload <tag> SHA256SUMS.sig --clobber` after.

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Unsigned assets only. Verifiers fail closed until the operator
          # uploads a detached signature out of band (see comment above).
          assets=(dist/phanspeed_*_all.deb dist/phanspeed.tar.gz dist/SHA256SUMS)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "phanspeed ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
