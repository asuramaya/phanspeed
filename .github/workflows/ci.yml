name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: sutra drift guard (integrity)
        run: make check-sutra

      - name: Python compiles
        run: python3 -m py_compile bin/phanspeedd bin/phanspeed bin/phanspeed-tune bin/phanspeed-update bin/sutra.py diag.py

      - name: Config validation (fuzz, hardware-free)
        run: python3 tests/test_validation.py

      - name: Ruff lint
        run: |
          python3 -m pip install --quiet ruff
          ruff check .

      - name: Shellcheck
        run: shellcheck install.sh uninstall.sh make-extension-zip.sh bin/phanspeed-healthcheck packaging/build-deb.sh packaging/debian/postinst packaging/debian/prerm packaging/debian/postrm packaging/activate-uuid-migration.sh tools/sync-signers.sh

      - name: Shell scripts parse
        run: bash -n install.sh && bash -n uninstall.sh

      - name: Extension JS syntax
        run: node --check extension/phanspeed@asuramaya/extension.js

      - name: metadata.json is valid
        run: python3 -c "import json; json.load(open('extension/phanspeed@asuramaya/metadata.json'))"

      - name: systemd unit verifies
        run: |
          # ExecStart binary isn't installed in CI; ignore only that line.
          systemd-analyze verify ./systemd/phanspeed.service 2>&1 \
            | grep -v 'not executable' | { ! grep .; }

      - name: Build .deb
        run: |
          bash packaging/build-deb.sh
          dpkg-deb --info dist/phanspeed_"$(cat VERSION)"_all.deb >/dev/null

# Note: tests/attack_socket.py requires real Dell hardware (dell-smm-hwmon +
# platform_profile) and is run by maintainers on-device, not in CI.
